<div class="page-hero animate-up">
  <h1 data-i18n="cars.hero.title">База машин</h1>
  <p data-i18n="cars.hero.sub">Изучай характеристики и рейтинги каждой машины в каталоге.</p>
</div>

<div class="section" style="padding-top: 0;">
  <div class="filters-bar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" data-i18n-ph="cars.search" placeholder="Поиск по марке или модели…">
    </div>
    <select class="select-custom" id="regionFilter" style="width: auto; min-width: 150px;">
      <option value="" data-i18n="region.allCountries">Все страны</option>
      <option value="china">🇨🇳 Китай</option>
      <option value="cis">🇷🇺 СНГ</option>
      <option value="germany">🇩🇪 Германия</option>
      <option value="japan">🇯🇵 Япония</option>
      <option value="korea">🇰🇷 Корея</option>
      <option value="usa">🇺🇸 США</option>
      <option value="italy">🇮🇹 Италия</option>
      <option value="europe">🇪🇺 Европа</option>
    </select>
    <select class="select-custom" id="categoryFilter" style="width: auto; min-width: 180px;">
      <option value="" data-i18n="cars.cat.all">Все категории</option>
      <option value="Subcompact">Субкомпакт</option>
      <option value="Compact">Компакт</option>
      <option value="Mid-size">Среднеразмерные</option>
      <option value="Luxury">Люкс</option>
      <option value="Sports">Спорт</option>
      <option value="SUV">Кроссоверы и внедорожники</option>
    </select>
    <select class="select-custom" id="sortFilter" style="width: auto; min-width: 160px;">
      <option value="name" data-i18n="cars.sort.name">Сортировка: А–Я</option>
      <option value="power" data-i18n="cars.sort.power">Сортировка: Мощность</option>
      <option value="acceleration" data-i18n="cars.sort.accel">Сортировка: Разгон 0–100</option>
      <option value="economy" data-i18n="cars.sort.econ">Сортировка: Экономичность</option>
      <option value="price" data-i18n="cars.sort.price">Сортировка: Цена</option>
    </select>
  </div>

  <div class="cars-grid" id="carsGrid"></div>
  <p id="noResults" style="display:none; color: var(--text-3); text-align:center; padding: 48px 0;" data-i18n="cars.none">Машины не найдены.</p>
</div>

<footer>
  <p>Carvi — <span>В образовательных целях. Помогаем покупателям принимать взвешенные решения.</span> · <a href="https://t.me/+L7u6oPMltUFkODVi" rel="noopener">Telegram</a> · <a href="https://vk.com/public221880789" rel="noopener">ВКонтакте</a></p>
</footer>

<script src="js/cars-data.js?v=2"></script>
<script src="js/i18n.js?v=2"></script>
<script>
const grid = document.getElementById('carsGrid');
const searchInput = document.getElementById('searchInput');
const catFilter   = document.getElementById('categoryFilter');
const sortFilter  = document.getElementById('sortFilter');
const regFilter   = document.getElementById('regionFilter');

function renderGrid() {
  const query = searchInput.value.toLowerCase();
  const cat   = catFilter.value.toLowerCase();
  const sort  = sortFilter.value;
  const reg   = regFilter.value;

  let cars = getAllCars().filter(c => {
    const nameMatch = (c.brand + ' ' + c.model).toLowerCase().includes(query);
    const catMatch  = !cat || c.category.toLowerCase().includes(cat);
    const regMatch  = !reg || carRegion(c) === reg;
    return nameMatch && catMatch && regMatch;
  });

  if (sort === 'power')        cars.sort((a,b) => b.performance.power - a.performance.power);
  else if (sort === 'acceleration') cars.sort((a,b) => a.performance.acceleration - b.performance.acceleration);
  else if (sort === 'economy') cars.sort((a,b) => a.engine.consumption.combined - b.engine.consumption.combined);
  else if (sort === 'price')   cars.sort((a,b) => a.price.min - b.price.min);
  else cars.sort((a,b) => (a.brand+a.model).localeCompare(b.brand+b.model));

  grid.innerHTML = '';
  document.getElementById('noResults').style.display = cars.length ? 'none' : 'block';

  cars.forEach((car, i) => {
    const avg = (Object.values(car.ratings).reduce((a,b)=>a+b,0) / Object.keys(car.ratings).length).toFixed(1);
    const card = document.createElement('a');
    card.href = `car.html?id=${car.id}`;
    card.className = 'car-card animate-up';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="car-card-img">
        <div class="bg-text">${car.brand}</div>
        <div style="position:relative;z-index:1;width:100%;">${carImageHTML(car, 180)}</div>
        <div style="position:absolute;top:10px;right:10px;">
          <span class="badge badge-blue">${car.year}</span>
        </div>
      </div>
      <div class="car-card-body">
        <div class="car-card-brand">${car.brand}</div>
        <div class="car-card-name">${car.model}</div>
        <div class="car-card-meta">
          <span class="badge badge-neutral">${categoryRu(car.category)}</span>
          <span class="badge badge-green">★ ${avg}</span>
        </div>
        <div class="car-card-stats">
          <div class="car-card-stat">
            <div class="v">${car.performance.power}</div>
            <div class="l">${t('cars.hp')}</div>
          </div>
          <div class="car-card-stat">
            <div class="v">${car.performance.acceleration}s</div>
            <div class="l">0–100</div>
          </div>
          <div class="car-card-stat">
            <div class="v">${car.engine.consumption.combined}</div>
            <div class="l">${t('cars.lkm')}</div>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

searchInput.addEventListener('input', renderGrid);
catFilter.addEventListener('change', renderGrid);
sortFilter.addEventListener('change', renderGrid);
regFilter.addEventListener('change', renderGrid);
renderGrid();
window.onLangChange = renderGrid;
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
